version: "3.9"

# ─────────────────────────────────────────────────────────────────
# Biomark — Docker Compose Production Stack
# ─────────────────────────────────────────────────────────────────
# Start: docker compose up -d
# Stop:  docker compose down
# Logs:  docker compose logs -f biomark
# ─────────────────────────────────────────────────────────────────

services:
  biomark:
    build:
      context: .
      dockerfile: Dockerfile
    image: biomark:latest
    container_name: biomark_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # Persist user database, uploaded data, and reports
      - biomark_data:/app/data
      - biomark_reports:/app/reports
      - biomark_models:/app/models
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Optional: Nginx reverse proxy for production deployment
  # Uncomment to enable HTTPS termination and path-based routing
  # nginx:
  #   image: nginx:alpine
  #   container_name: biomark_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - biomark

volumes:
  biomark_data:
    driver: local
  biomark_reports:
    driver: local
  biomark_models:
    driver: local
